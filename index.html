<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Portfolio</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated floating shapes -->
    <div class="floating-shapes">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Main content -->
    <div class="content">
        <div class="portfolio-card text-center">
            <div class="profile-img">
                <i class="fas fa-code"></i>
            </div>
            
            <h1>John Doe</h1>
            <div class="typing-text">Full Stack Developer</div>
            
            <p class="mb-4">
                I create amazing web experiences with modern technologies.
                Let's build something awesome together!
            </p>

            <!-- Animated Buttons -->
            <div class="d-flex flex-wrap justify-content-center gap-3">
                <button class="btn-custom btn-gradient">
                    <i class="fas fa-rocket me-2"></i>Hire Me
                </button>
                
                <button class="btn-custom btn-border-pulse">
                    <i class="fas fa-download me-2"></i>Resume
                </button>
                
                <button class="btn-custom btn-3d">
                    <span>CLICK ME</span>
                </button>
            </div>

            <!-- Social Links -->
            <div class="social-links">
                <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
                      </html>
